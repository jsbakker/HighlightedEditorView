# This workflow will archive the project to build the framework and copy it to artifacts

name: Build Framework

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Essential for git tags/history

    - name: Build Documentation
      run: |
        xcodebuild docbuild \
          -scheme HighlightedEditorView \
          -configuration Release \
          -destination "platform=macOS" \
          -derivedDataPath ./docs_build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \

    - name: Set Dynamic Version Name
      id: version_logic
      run: |
        # Use GITHUB_SHA to get the exact commit that triggered the run
        # Use shell parameter expansion to get the first 7 characters
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
        
        # Check for a tag on the triggering SHA
        TAG=$(git describe --tags --exact-match "${GITHUB_SHA}" 2>/dev/null || echo "")
        
        if [ -n "$TAG" ]; then
          echo "VERSION=$TAG" >> $GITHUB_ENV
        else
          echo "VERSION=$SHORT_SHA" >> $GITHUB_ENV
        fi

    - name: Zip HighlightedEditorView Files
      run: |
        cd ./docs_build/Build/Products/Release
        zip -ry HighlightedEditorView-${{ env.VERSION }}.zip ./

    - name: Upload HighlightedEditorView Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HighlightedEditorView-Release-${{ env.VERSION }}
        path: ./docs_build/Build/Products/Release/HighlightedEditorView-${{ env.VERSION }}.zip
        retention-days: 14
